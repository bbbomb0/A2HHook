name: Build A2HHook Module

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NDK_VERSION: "r26d"
  API_LEVEL: 31

jobs:
  build:
    name: Build arm64-v8a module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip unzip

      - name: Setup Android NDK
        run: |
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
          NDK_URL="https://dl.google.com/android/repository/${NDK_ZIP}"
          wget -q -O "$NDK_ZIP" "$NDK_URL"
          unzip -q "$NDK_ZIP"
          mv "android-ndk-${NDK_VERSION}" "$HOME/android-ndk"
          echo "ANDROID_NDK_HOME=$HOME/android-ndk" >> "$GITHUB_ENV"

      - name: Build and package
        run: |
          bash ./build.sh ci
          VERSION="$(sed -n 's/^version=//p' module.prop | head -n 1)"
          ZIP_NAME="a2h_hook_${VERSION}.zip"
          test -f "$ZIP_NAME"
          unzip -t "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload module ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 90

      - name: Upload native binaries
        uses: actions/upload-artifact@v4
        with:
          name: a2h_native_arm64-v8a
          path: |
            bin/a2h_apply
            bin/a2h_patch
            bin/a2h_trigger
            zygisk/arm64-v8a/a2h_hook.so
          retention-days: 90
